title: Ibiza Housing Radar
tagline: Observatorio semanal sobre la crisis de vivienda en Ibiza
description: >
  Informe automatizado de la crisis de vivienda en Ibiza, con foco en
  trabajadores de temporada. Cada lunes una lectura de la prensa local
  y propuestas accionables enlazadas a las noticias que las motivan.
author: otundra
email: serranocervantes@gmail.com

baseurl: "/ibiza-housing-radar"
url: "https://otundra.github.io"

timezone: Europe/Madrid
lang: es

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  smart_quotes: ldquo,rdquo,lsquo,rsquo
  hard_wrap: false

permalink: /:path/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

feed:
  path: feed.xml

# Colección de ediciones. El folder es `_editions/`.
collections:
  editions:
    output: true

defaults:
  - scope:
      path: ""
      type: editions
    values:
      layout: edition

# Analítica — GoatCounter (sin cookies, GDPR-friendly).
# Rellenar con el ID del sitio (subdomain de goatcounter.com) para activar.
# Dejar vacío ("") para deshabilitar.
goatcounter_id: ""

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - node_modules/
