<!doctype html>
<html lang="{{ site.lang | default: 'es' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_newlines | truncate: 160 }}">
  <meta name="author" content="{{ site.author }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_newlines | truncate: 160 }}">
  <meta property="og:type" content="article">
  <meta property="og:site_name" content="{{ site.title }}">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/main.css?v=2">

  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ site.baseurl }}/feed.xml">
  <link rel="icon" href="{{ site.baseurl }}/assets/favicon.svg" type="image/svg+xml">
</head>
<body>
  {% include header.html %}

  <main class="site-main">
    {{ content }}
  </main>

  {% include footer.html %}

  {% if site.goatcounter_id and site.goatcounter_id != "" %}
  <script data-goatcounter="https://{{ site.goatcounter_id }}.goatcounter.com/count"
          async src="//gc.zgo.at/count.js"></script>
  {% endif %}
</body>
</html>
