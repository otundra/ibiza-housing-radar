name: Weekly report

on:
  # Lunes 05:00 UTC = 07:00 CEST en verano / 06:00 CET en invierno.
  # La ventana activa del proyecto es mayo-octubre (siempre CEST = 07:00).
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write  # necesario para commit-back de la edición + costes

concurrency:
  group: weekly-report
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        run: |
          python -m src.report

      - name: Commit edition and costs
        run: |
          git config user.name "ibiza-radar-bot"
          git config user.email "bot@users.noreply.github.com"

          # Añade la edición nueva, índice, costes dashboard y CSV de costes
          git add docs/editions/ docs/index.md docs/costs.md data/costs.csv 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "Sin cambios para commitear"
            exit 0
          fi

          WEEK=$(date -u +'%G-W%V')
          git commit -m "report: edición semanal ${WEEK}

          Generado automáticamente por el workflow Weekly report.

          Co-Authored-By: Claude Opus 4.7 <noreply@anthropic.com>"
          git push
