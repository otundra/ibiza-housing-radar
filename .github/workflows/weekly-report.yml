name: Weekly report

on:
  # Lunes 05:00 UTC = 07:00 CEST en verano / 06:00 CET en invierno.
  # La ventana activa del proyecto es mayo-octubre (siempre CEST = 07:00).
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

permissions:
  contents: write  # commit-back de la edición + costes
  issues: write    # fallback de alertas si Telegram cae (src/notify.py)

concurrency:
  group: weekly-report
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # `gh` CLI disponible para fallback de alertas a issue. Usa GH_TOKEN automático.
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check decisions reviews
        # Avisa por Telegram si alguna decisión del proyecto tiene "Próxima
        # revisión" vencida o próxima (≤7 días). No bloquea el pipeline.
        run: |
          python -m src.decisions_watch
        continue-on-error: true

      - name: Run pipeline
        run: |
          python -m src.report

      - name: Regenerate internal panel
        # Regenera private/panel.md agregando señales del mes (coste,
        # autoevaluación, verificación, decisiones pendientes, última edición).
        # No genera datos, solo agrega. No bloquea el pipeline.
        run: |
          python -m src.panel
        continue-on-error: true

      - name: Commit edition and costs
        # Siempre intenta commitear, también si el pipeline falló: hay que
        # persistir la marca de fallo (data/PIPELINE_FAILED.flag) para que
        # el siguiente run la lea y detecte la recuperación. También el
        # CSV de costes parcial es información útil aunque haya fallo.
        if: always()
        run: |
          git config user.name "ibiza-radar-bot"
          git config user.email "bot@users.noreply.github.com"

          # Añade edición, índice, dashboard de costes, tablero interno y CSV de costes.
          # docs/costs.md ya no existe (el dashboard se mueve a private/ fuera de Jekyll).
          # data/PIPELINE_FAILED.flag se incluye para que la marca de fallo sobreviva
          # entre runs (la lee el siguiente run para detectar recuperación).
          # private/self-review/ y private/self-review-log.md sí se commitean: son
          # auditoría interna del editor (no servidos por Jekyll, fuera de la web).
          # data/audit/ contiene los logs JSON del auditor MVP por edición — los
          # lee self_review en la siguiente corrida para incluir el bloque
          # "auditor" (ratio de disputas Haiku↔Sonnet).
          # data/proposals_history.json es el histórico acumulado de propuestas
          # (la fuente de la página /propuestas/). Se va engordando cada semana.
          # data/feed_health.json es el histórico de salud de feeds (sources_health).
          git add docs/_editions/ docs/index.md docs/propuestas.md private/costs.md private/panel.md data/costs.csv 2>/dev/null || true
          git add private/self-review/ private/self-review-log.md 2>/dev/null || true
          git add data/audit/ data/proposals_history.json data/feed_health.json 2>/dev/null || true
          git add data/PIPELINE_FAILED.flag 2>/dev/null || true
          # Si la marca de fallo ya no existe (recuperación), también hay que
          # registrar su borrado en el commit. -u fuerza staging del archivo eliminado.
          git add -u data/PIPELINE_FAILED.flag 2>/dev/null || true

          if git diff --staged --quiet; then
            echo "Sin cambios para commitear"
            exit 0
          fi

          WEEK=$(date -u +'%G-W%V')
          git commit -m "report: edición semanal ${WEEK}

          Generado automáticamente por el workflow Weekly report.

          Co-Authored-By: Claude Opus 4.7 <noreply@anthropic.com>"

          # Reintento con rebase si alguien empujó entre medias (humanos o
          # ediciones anteriores). Máximo 3 intentos para no engancharse.
          for i in 1 2 3; do
            if git push; then
              echo "Push OK en intento $i"
              exit 0
            fi
            echo "Push rechazado, rebase y reintento ($i/3)..."
            git pull --rebase origin main
          done
          echo "::error::No se pudo hacer push tras 3 intentos"
          exit 1
